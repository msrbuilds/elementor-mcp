name: Tests

# Runs the PHPUnit suite (Security / Capabilities / Input / Functional).
# The fork ships composer.json + phpunit.xml + tests/ but had no CI to run them.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Lint changed PHP (syntax)
        run: |
          find includes elementor-mcp.php -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null

      - name: PHPUnit
        run: vendor/bin/phpunit --testdox
